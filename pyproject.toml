[project]
name = "agent-skills-engineering-kit"
version = "0.1.0"
description = "Risk-aware, token-efficient skills for software engineering agents"
requires-python = ">=3.11"
license = { text = "MIT" }
readme = "README.md"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
