version = 1

[agent]
platform = "codex"
command = ["codex", "exec", "{prompt}"]
timeout_seconds = 1800

[graphify]
enabled = true
required = false
directed = true
update_before_task = "changed"
query_budget = 1200
max_initial_queries = 1

[workflow]
default_mode = "auto"
require_clean_tree = true
require_review = true
deep_requires_approval = true
max_fix_iterations = 1

[budget]
enabled = true
soft_input_tokens = 30000
hard_input_tokens = 60000
soft_output_tokens = 8000
hard_output_tokens = 16000
soft_agent_calls = 4
hard_agent_calls = 7
soft_duration_seconds = 1800
hard_duration_seconds = 3600
unknown_usage_policy = "warn"

[budget.phase_agent_call_limits]
plan = 1
implementation = 1
review = 2
targeted_fix = 1

[context]
enabled = true
cache_enabled = true
cache_path = ".agent/cache/context.db"
profile_path = ".agent/project-profile.json"
max_profile_files = 5000
max_candidate_files = 12
max_symbols_per_file = 20
max_context_chars = 16000
cache_ttl_seconds = 604800
stale_after_days = 30

[quality]
enabled = true
provider = "strictacode"
required = false
mode = "report"
details_policy = "on_warning"
cache_enabled = true
cache_ttl_seconds = 86400
timeout_seconds = 900
command = ["strictacode"]
max_packages = 5
max_modules = 5
max_classes = 10
max_methods = 15
max_functions = 15
include = []
exclude = ["vendor", "generated", ".venv", "node_modules"]
baseline_strategy = "run_start"
base_branch = "main"
baseline_file = ""
unavailable_policy = "warn"

[quality.absolute]
score = 0
rp = 0
op = 0
density = 0.0

[quality.delta]
score = 5
rp = 5
op = 5
density = 3.0
new_critical_hotspots = 0

[verification]
commands = [
  ["python", "-m", "unittest", "discover", "-s", "tests", "-v"],
  ["python", "-m", "compileall", "-q", "src", "tests"]
]
timeout_seconds = 900

[scope]
max_changed_files = 20

[security]
allowed_executables = [
  "git", "python", "python3", "uv", "pytest", "ruff", "mypy",
  "npm", "pnpm", "yarn", "make", "codex", "claude", "gemini",
  "aider", "graphify", "strictacode"
]
denied_substrings = [
  "rm -rf /", "git push --force", "git reset --hard",
  "drop database", "truncate table"
]
