name: Release AgentKit

on:
  push:
    tags: ["v1.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build jsonschema "setuptools>=77" twine wheel
      - run: python scripts/validate_release.py
      - run: python scripts/verify_reproducible_build.py
      - name: Build normalized distributions
        run: |
          export SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          python -m build --no-isolation
          python scripts/normalize_sdist.py dist/*.tar.gz
      - run: python -m twine check dist/*
      - name: Generate checksums
        run: sha256sum dist/* > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: agentkit-distributions
          path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: agentkit-checksums
          path: SHA256SUMS

  publish:
    if: startsWith(github.ref, 'refs/tags/v1.')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agent-skills-engineering-kit/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agentkit-distributions
          path: dist
      - name: Publish through PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
