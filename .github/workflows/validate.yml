name: Validate AgentKit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip "setuptools>=68" wheel
      - name: Install package without runtime dependencies
        run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Validate skill structure
        run: python scripts/validate_skills.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: python -m compileall -q src scripts tests
      - name: Verify CLI entrypoint
        run: agentkit --help
